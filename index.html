<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>어바웃피싱 × 하나손해보험 · H안 프로토타입 R60</title>
<meta name="theme-color" content="#0041FF"/>
<meta name="viewport" content="width=1280"/>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<style>
  /* ============ DESIGN TOKENS (inlined from colors_and_type.css) ============ */
  :root {
    --af-blue: #0041FF;
    --af-blue-press: #0033CC;
    --af-blue-bg: #EEF8FF;
    --af-blue-bg-2: #F2F5FA;
    --fg-1: #191919;
    --fg-2: #363636;
    --fg-3: #767676;
    --fg-4: #999999;
    --fg-5: #AAAAAA;
    --fg-disabled: #CCCCCC;
    --bg: #FFFFFF;
    --surface-1: #F8F8F8;
    --surface-2: #F3F3F3;
    --surface-3: #EEEEEE;
    --surface-cool: #F5F7FA;
    --surface-cool-2: #F2F5FA;
    --border-1: #EEEEEE;
    --border-2: #E0E0E0;
    --border-3: #E1E8F1;
    --red: #EE0005;
    --red-2: #FF0000;
    --red-3: #FF3C3A;
    --orange: #FF4C14;
    --orange-soft: #FFA77B;
    --yellow: #FFD91E;
    --green: #245C45;
    --green-lime: #B9E100;
    --purple: #6433DF;
    --radius-xs: 4px;
    --radius-sm: 5px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 18px;
    --radius-2xl: 22px;
    --radius-pill: 1000px;
    --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
    --space-5: 20px; --space-6: 24px; --space-7: 32px;
    --gutter: 18px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 24px rgba(25,25,25,0.12);
    --shadow-modal: 0 20px 60px rgba(0,0,0,0.35);
    --font-sans: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont,
      "Apple SD Gothic Neo", "Noto Sans KR", "Spoqa Han Sans Neo", sans-serif;
    --letter-tight: -0.4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: var(--font-sans);
    letter-spacing: var(--letter-tight);
    color: var(--fg-2);
    background: #E8E8E8;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  input, textarea { font-family: inherit; letter-spacing: var(--letter-tight); }

  /* ============ TOP NAV ============ */
  .topnav { position: sticky; top: 0; z-index: 80; background: white; border-bottom: 1px solid var(--border-1); }
  .topnav-row { display: flex; align-items: center; gap: 24px; padding: 14px 28px; min-height: 56px; }
  .topnav-row.row1 { border-bottom: 1px solid var(--border-1); }
  .brand { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 800; color: var(--fg-1); letter-spacing: var(--letter-tight); }
  .brand-x { color: var(--fg-4); font-weight: 400; }
  .planbar { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
  .plan-chip { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 700; background: var(--surface-1); color: var(--fg-3); letter-spacing: var(--letter-tight); transition: all 0.15s; }
  .plan-chip .plan-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: 0.9; }
  .plan-chip .plan-code { display: inline-flex; width: 18px; height: 18px; border-radius: 50%; align-items: center; justify-content: center; background: rgba(0,0,0,0.05); font-weight: 800; font-size: 10px; }
  .plan-chip.active { background: #191919; color: white; }
  .plan-chip.active .plan-code { background: rgba(255,255,255,0.18); }
  .meta-group { display: flex; gap: 12px; font-size: 12px; color: var(--fg-3); align-items: center; }
  .meta-pill { background: var(--surface-1); padding: 6px 12px; border-radius: var(--radius-pill); font-weight: 600; color: var(--fg-2); }

  .flowbar-label { font-size: 11px; font-weight: 700; color: var(--fg-4); letter-spacing: 0.08em; }
  .flowbar { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .flow-chip { display: inline-flex; align-items: center; gap: 6px; padding: 7px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; color: var(--fg-3); letter-spacing: var(--letter-tight); transition: all 0.15s; }
  .flow-chip .flow-n { display: inline-flex; width: 22px; height: 18px; border-radius: 3px; align-items: center; justify-content: center; background: var(--surface-1); color: var(--fg-3); font-size: 10px; font-weight: 700; letter-spacing: 0; }
  .flow-chip.active { background: #191919; color: white; font-weight: 700; }
  .flow-chip.active .flow-n { background: rgba(255,255,255,0.2); color: white; }
  .flow-chip:hover:not(.active) { background: var(--surface-1); }

  /* ============ MAIN GRID ============ */
  .main { display: grid; grid-template-columns: minmax(0, 1fr) minmax(520px, 560px); gap: 40px; padding: 32px 40px 80px; max-width: 1600px; margin: 0 auto; }

  /* ============ STAGE (phone) ============ */
  .stage { position: relative; }
  .stage-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 11px; color: var(--fg-4); font-weight: 600; letter-spacing: 0.08em; }
  .stage-meta .owner-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--radius-pill); background: var(--af-blue-bg); color: var(--af-blue); font-weight: 700; letter-spacing: var(--letter-tight); font-size: 11px; }
  .stage-meta .owner-chip.owner-hana { background: #E8F2FF; color: #0041FF; }
  .stage-meta .owner-chip.owner-pass { background: #FFE8E8; color: #EE0005; }
  .stage-meta .owner-chip.owner-handoff { background: linear-gradient(90deg, var(--af-blue-bg) 0%, #E8F2FF 100%); color: #0041FF; }
  .stage-meta .owner-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .phone { width: 393px; height: 820px; margin: 0 auto; border-radius: 50px; background: #000; position: relative; padding: 11px; box-shadow: 0 40px 80px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.08); }
  .phone-screen { width: 100%; height: 100%; background: white; border-radius: 39px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .notch { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 110px; height: 32px; background: #000; border-radius: 20px; z-index: 10; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 30px 8px; font-size: 15px; font-weight: 600; color: var(--fg-1); letter-spacing: 0; flex-shrink: 0; background: transparent; position: relative; z-index: 5; }
  .status-bar.on-dark { color: white; }
  .status-bar.on-dark svg { filter: brightness(0) invert(1); }
  .status-bar svg { display: block; }
  .screen-body { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; position: relative; }
  .screen-body::-webkit-scrollbar { width: 4px; }
  .screen-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }
  .screen-body::-webkit-scrollbar-track { background: transparent; }

  /* ============ SCREEN TRANSITION ANIMATION ============ */
  @keyframes screenSlideIn {
    from { opacity: 0; transform: translateX(24px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes screenSlideBack {
    from { opacity: 0; transform: translateX(-24px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes screenFadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .screen-body.anim-forward > * { animation: screenSlideIn 0.32s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
  .screen-body.anim-back > * { animation: screenSlideBack 0.32s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
  .screen-body.anim-tab > * { animation: screenFadeUp 0.22s ease-out both; }

  /* ============ AF APP HEADER ============ */
  .af-header { padding: 4px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
  .af-header .af-title { font-size: 22px; font-weight: 800; color: var(--fg-1); letter-spacing: var(--letter-tight); }
  .af-header .af-icons { display: flex; gap: 16px; }
  .af-header .af-icons button { padding: 4px; display: inline-flex; }

  .af-subtab { display: flex; gap: 20px; padding: 2px 20px 10px; position: relative; border-bottom: 1px solid var(--border-1); }
  .af-subtab .subtab-item { font-size: 16px; font-weight: 400; color: var(--fg-4); letter-spacing: var(--letter-tight); padding: 4px 0 10px; cursor: pointer; position: relative; transition: color 0.2s; }
  .af-subtab .subtab-item.active { color: var(--fg-1); font-weight: 700; }
  .af-subtab .subtab-item.active::after { content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: var(--fg-1); border-radius: 1px; }

  /* ============ 01 HOME ============ */
  .hero-banner { margin: 14px 20px 0; border-radius: var(--radius-lg); height: 196px; position: relative; overflow: hidden; background: var(--surface-2); }
  .hero-banner img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero-banner .hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ============ IMAGE FALLBACKS (깃헙 페이지스 자산 누락 대응) ============ */
  .hero-banner.no-img { background: linear-gradient(135deg, #FFC48A 0%, #E892A7 35%, #4A6AB8 70%, #1D2E6A 100%); }
  .hero-banner.no-img::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 75% 40%, rgba(255,220,160,0.45) 0%, transparent 50%); z-index: 1; }
  .hero-banner.no-img::after { content: ''; position: absolute; left: 50%; bottom: 30%; transform: translateX(-50%); width: 80px; height: 30px; background: rgba(10,20,50,0.55); clip-path: polygon(10% 50%, 20% 30%, 80% 30%, 90% 50%, 85% 100%, 15% 100%); z-index: 1; }
  .boat-thumb.no-img { background: linear-gradient(135deg, #87B5D8 0%, #4A85AD 100%); position: relative; }
  .boat-thumb.no-img::after { content: '⛴'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; color: rgba(255,255,255,0.6); }
  .catch-photo.no-img { background: linear-gradient(135deg, #7FB5D9 0%, #2C5F87 100%); position: relative; }
  .catch-photo.no-img::after { content: '조황'; position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 13px; font-weight: 800; color: rgba(255,255,255,0.55); letter-spacing: -0.3px; }
  .detail-hero.no-img { background: linear-gradient(135deg, #87B5D8 0%, #2C5F87 100%); position: relative; }
  .detail-hero.no-img::after { content: '⛴'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 64px; color: rgba(255,255,255,0.35); }
  .cpi.no-img { background: linear-gradient(135deg, #6B8E4A 0%, #4A6B30 100%); }
  .cpi.no-img::after { content: ''; position: absolute; inset: 40% 45%; border-radius: 50%; background: rgba(255,255,255,0.25); }
  .hot-card .boat-thumb.no-img::after { font-size: 28px; }
  .hero-pill { position: absolute; top: 14px; left: 14px; display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--radius-pill); background: rgba(255,255,255,0.95); font-size: 11px; font-weight: 800; color: #009490; letter-spacing: var(--letter-tight); z-index: 2; }
  .hero-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #009490; }
  .hero-overlay { position: absolute; left: 0; right: 0; bottom: 0; padding: 14px 16px 16px; background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,0.88) 100%); color: white; }
  .hero-overlay .hero-kicker { font-size: 11px; font-weight: 500; opacity: 0.9; margin-bottom: 4px; }
  .hero-overlay .hero-title { font-size: 20px; font-weight: 800; line-height: 1.2; letter-spacing: var(--letter-tight); }
  .hero-overlay .hero-sub { font-size: 13px; font-weight: 500; margin-top: 6px; opacity: 0.9; }
  .hero-dots { position: absolute; bottom: 14px; right: 16px; display: flex; gap: 4px; z-index: 2; }
  .hero-dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.45); }
  .hero-dots span.active { background: white; width: 14px; border-radius: 3px; }

  .info-card { margin: 14px 20px 0; padding: 14px 16px; background: var(--af-blue-bg); border-radius: var(--radius-lg); display: flex; gap: 12px; align-items: flex-start; }
  .info-card .info-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--af-blue); color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; letter-spacing: 0; flex-shrink: 0; }
  .info-card .info-text { font-size: 12.5px; color: var(--fg-2); line-height: 1.5; }
  .info-card .info-text b { font-weight: 700; color: var(--fg-1); display: block; margin-bottom: 2px; font-size: 13px; }
  .info-card .info-text strong { color: var(--af-blue); font-weight: 700; }

  .stats-row { margin: 14px 20px 0; padding: 16px 12px; background: var(--surface-1); border-radius: var(--radius-lg); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-item { text-align: center; position: relative; }
  .stat-item + .stat-item::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 1px; background: var(--border-1); }
  .stat-num { font-size: 22px; font-weight: 800; color: var(--af-blue); letter-spacing: var(--letter-tight); }
  .stat-unit { font-size: 11px; color: var(--fg-3); font-weight: 500; margin-left: 2px; }
  .stat-label { font-size: 11px; color: var(--fg-3); margin-top: 4px; font-weight: 500; }

  .section-head { margin: 26px 20px 12px; display: flex; justify-content: space-between; align-items: center; }
  .section-head .title { font-size: 17px; font-weight: 700; color: var(--fg-1); letter-spacing: var(--letter-tight); }
  .section-head .title .t-kicker { display: block; font-size: 11px; color: var(--fg-3); font-weight: 500; margin-bottom: 3px; letter-spacing: 0.06em; }
  .section-head .more { font-size: 12px; color: var(--fg-3); font-weight: 500; cursor: pointer; }

  /* 기획전 Promo gallery */
  /* 기획전 — 에디토리얼 premium 카드 */
  .promo-scroll { display: flex; gap: 10px; padding: 0 20px 8px; overflow-x: auto; scrollbar-width: none; scroll-snap-type: x mandatory; }
  .promo-scroll::-webkit-scrollbar { display: none; }
  .promo-card { flex: 0 0 calc(100% - 36px); height: 200px; border-radius: 20px; position: relative; overflow: hidden; color: white; cursor: pointer; scroll-snap-align: center; transition: transform 0.2s; isolation: isolate; }
  .promo-card:hover { transform: translateY(-2px); }
  .promo-card .pc-bg { position: absolute; inset: 0; z-index: 0; }
  .promo-card .pc-overlay { position: absolute; inset: 0; z-index: 1; background: linear-gradient(155deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.65) 100%); }
  .promo-card .pc-inner { position: absolute; inset: 0; z-index: 3; padding: 28px 28px 24px; display: flex; flex-direction: column; justify-content: space-between; }
  .promo-card .pc-top { display: flex; align-items: center; justify-content: space-between; }
  .promo-card .pc-issue { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; opacity: 0.85; }
  .promo-card .pc-issue-date { font-size: 10px; font-weight: 500; opacity: 0.7; letter-spacing: 0.08em; }
  .promo-card .pc-body-block { }
  .promo-card .pc-category { font-size: 11px; font-weight: 800; letter-spacing: 0.14em; opacity: 0.88; margin-bottom: 10px; position: relative; padding-left: 18px; }
  .promo-card .pc-category::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 12px; height: 1px; background: currentColor; opacity: 0.9; }
  .promo-card .pc-t { font-size: 24px; font-weight: 800; line-height: 1.2; letter-spacing: var(--letter-tight); }
  .promo-card .pc-s { margin-top: 8px; font-size: 12.5px; font-weight: 400; opacity: 0.78; line-height: 1.5; max-width: 260px; }
  .promo-card .pc-foot { display: flex; align-items: center; justify-content: space-between; }
  .promo-card .pc-cta { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; letter-spacing: var(--letter-tight); border-bottom: 1px solid rgba(255,255,255,0.4); padding-bottom: 3px; }
  .promo-card .pc-cta::after { content: '→'; font-size: 14px; transition: transform 0.2s; }
  .promo-card:hover .pc-cta::after { transform: translateX(3px); }
  .promo-card .pc-num { font-size: 46px; font-weight: 900; letter-spacing: -0.05em; opacity: 0.22; font-family: 'Times New Roman', serif; font-style: italic; line-height: 1; }

  /* Editorial backgrounds — photo + deep color overlays */
  .promo-card.p1 .pc-bg { background: radial-gradient(ellipse at 70% 30%, #2D4A5A 0%, #1A2B38 60%, #0A1620 100%); }
  .promo-card.p1 .pc-bg::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 75% 40%, rgba(255,160,80,0.25) 0%, transparent 40%), radial-gradient(circle at 20% 80%, rgba(90,140,180,0.18) 0%, transparent 50%); }
  .promo-card.p1 .pc-bg::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(180deg, transparent 0px, transparent 4px, rgba(255,255,255,0.015) 4px, rgba(255,255,255,0.015) 5px); opacity: 0.4; }

  .promo-card.p2 .pc-bg { background: linear-gradient(160deg, #1A2A5C 0%, #0F1A3A 50%, #050A1C 100%); }
  .promo-card.p2 .pc-bg::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 80% 20%, rgba(100,140,255,0.35) 0%, transparent 50%), radial-gradient(circle at 30% 90%, rgba(180,120,220,0.15) 0%, transparent 60%); }
  .promo-card.p2 .pc-bg::after { content: ''; position: absolute; right: -60px; top: -40px; width: 200px; height: 200px; border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; }

  .promo-card.p3 .pc-bg { background: linear-gradient(150deg, #0E3B39 0%, #082725 50%, #041414 100%); }
  .promo-card.p3 .pc-bg::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 75% 30%, rgba(0,200,190,0.28) 0%, transparent 45%); }
  .promo-card.p3 .pc-bg::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, rgba(0,148,144,0.18) 0%, transparent 70%); }

  .promo-card.p4 .pc-bg { background: linear-gradient(155deg, #2A1848 0%, #170A2C 50%, #080214 100%); }
  .promo-card.p4 .pc-bg::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 80% 25%, rgba(200,170,80,0.2) 0%, transparent 45%), radial-gradient(circle at 25% 75%, rgba(130,85,220,0.25) 0%, transparent 55%); }
  .promo-card.p4 .pc-bg::after { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 85% 30%, rgba(255,215,130,0.6) 0px, rgba(255,215,130,0.6) 1px, transparent 1.5px), radial-gradient(circle at 60% 20%, rgba(255,215,130,0.4) 0px, rgba(255,215,130,0.4) 0.8px, transparent 1.3px), radial-gradient(circle at 30% 35%, rgba(255,215,130,0.5) 0px, rgba(255,215,130,0.5) 1px, transparent 1.5px); }

  .promo-dots { display: flex; justify-content: center; gap: 5px; padding: 10px 20px 14px; }
  .promo-dots .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border-2); transition: all 0.2s; }
  .promo-dots .dot.active { background: var(--fg-1); width: 16px; border-radius: 3px; }

  /* 실시간 HOT 가로 스크롤 */
  .hot-scroll { display: flex; gap: 10px; padding: 0 20px 6px; overflow-x: auto; scrollbar-width: none; }
  .hot-scroll::-webkit-scrollbar { display: none; }
  .hot-card { flex: 0 0 166px; background: white; border-radius: var(--radius-md); overflow: hidden; cursor: pointer; }
  .hot-card .hc-img { position: relative; width: 100%; height: 110px; background: var(--surface-2); overflow: hidden; }
  .hot-card .hc-img img { width: 100%; height: 100%; object-fit: cover; }
  .hot-card .hc-live { position: absolute; top: 8px; left: 8px; padding: 3px 7px; border-radius: var(--radius-xs); background: #EE0005; color: white; font-size: 10px; font-weight: 800; display: inline-flex; align-items: center; gap: 4px; }
  .hot-card .hc-live::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: white; animation: pulse 1.4s ease-in-out infinite; }
  .hot-card .hc-free { position: absolute; top: 8px; right: 8px; padding: 3px 7px; border-radius: var(--radius-xs); background: rgba(0,65,255,0.92); color: white; font-size: 10px; font-weight: 800; }
  .hot-card .hc-body { padding: 10px 12px 12px; }
  .hot-card .hc-name { font-size: 13px; font-weight: 700; color: var(--fg-1); }
  .hot-card .hc-loc { font-size: 11px; color: var(--fg-3); margin-top: 2px; }
  .hot-card .hc-price { margin-top: 6px; font-size: 13px; font-weight: 800; color: var(--fg-1); }
  .hot-card .hc-price .hc-won { font-size: 11px; color: var(--fg-3); font-weight: 500; }
  .hot-card .hc-rating { font-size: 11px; color: var(--fg-3); margin-top: 2px; }
  .hot-card .hc-rating .star { color: #FFB800; }
  .hot-card .hc-rating b { color: var(--fg-1); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ============ LOADING OVERLAY (browser-exit animation) ============ */
  @keyframes spinnerRotate { to { transform: rotate(360deg); } }
  @keyframes overlayFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes appShrink { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.92); opacity: 0.25; } }
  @keyframes browserSlideUp { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
  .loading-overlay { position: absolute; inset: 0; z-index: 100; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(3px); animation: overlayFadeIn 0.2s ease-out; }

/* ============ IMG_MAP RESOLVER (단일 HTML 배포용 — 모든 assets/ 경로를 data URI로 치환) ============ */
function resolveImgSrc(img) {
  const s = img.getAttribute('src');
  if (s && IMG_MAP[s]) { img.src = IMG_MAP[s]; }
}
function applyImgMap(root) {
  (root || document).querySelectorAll('img[src^="assets/"]').forEach(resolveImgSrc);
}
// Run on DOM ready + observe mutations (dynamically rendered screens)
document.addEventListener('DOMContentLoaded', () => {
  applyImgMap();
  new MutationObserver(muts => {
    muts.forEach(m => m.addedNodes.forEach(n => {
      if (n.nodeType !== 1) return;

const RENDERERS = {
  home: screenHome, detail: screenDetail, passenger: screenPassenger, payment: screenPayment,
  handoff: screenHandoff, hana_web: screenHanaWeb, hana_terms: screenHanaTerms,
  pass: screenPass, hana_done: screenHanaDone, done: screenDone,
  about_hana: screenAboutHana,
};

function renderPlanbar() {
  const el = document.getElementById('planbar');
  el.innerHTML = PLANS.map(p => `
    <span class="plan-chip ${p.active ? 'active' : ''}" data-plan="${p.id}">
      <span class="plan-dot"></span>
      <span class="plan-code">${p.id}</span>
      ${p.name}
    </span>
  `).join('');
  el.querySelectorAll('[data-plan]').forEach(chip => {
    chip.addEventListener('click', () => {
      const id = chip.dataset.plan;
      if (id === 'H') return;
      alert(`${id}안은 별도 프로토타입입니다. H안으로 진행합니다.`);
    });
  });
}

function renderFlowbar() {
  const el = document.getElementById('flowbar');
  el.innerHTML = FLOW_H.map(s => `
    <button class="flow-chip ${state.flow === s.id ? 'active' : ''}" data-flow="${s.id}">
      <span class="flow-n">${s.n}</span>${s.label}
    </button>
  `).join('');
  el.querySelectorAll('[data-flow]').forEach(b => {
    b.addEventListener('click', () => goto(b.dataset.flow));
  });
}

function renderOwnerChip() {
  const flow = FLOW_H.find(s => s.id === state.flow);
  const chipKind = flow ? flow.chipKind : 'af';
  const owner = OWNER_LABELS[chipKind];
  const el = document.getElementById('ownerChip');
  el.className = `owner-chip ${owner.cls}`;
  el.innerHTML = `<span class="owner-dot"></span>${owner.label}`;
}

function renderStage(animClass) {
  const body = document.getElementById('screenBody');
  const sbHolder = document.getElementById('statusBar');
  const flow = state.flow;
  const dark = (flow === 'detail');
  sbHolder.innerHTML = statusBar(dark);
  body.innerHTML = RENDERERS[flow]();
  body.scrollTop = 0;
  // Apply transition animation
  body.classList.remove('anim-forward', 'anim-back', 'anim-tab');
  void body.offsetWidth; // force reflow
  if (animClass) body.classList.add(animClass);
}

function renderPanel() {
  const b = BRIEFING[state.flow] || BRIEFING.home;
  const el = document.getElementById('panel');
  const fitLabel = b.fit.v === 'ok' ? '● FIT · OK' : b.fit.v === 'warn' ? '⚠ FIT · WARN' : '✕ FIT · CONFLICT';
  el.innerHTML = `
    <div class="panel-head">
      <span class="plan-pill-lg">PLAN H</span>
      <span class="plan-meta">${b.sub}</span>
    </div>
    <div class="panel-title">${b.title}</div>
    <div class="panel-lead">${b.intent}</div>

    ${b.decisions && b.decisions.length ? `
    <div class="panel-section">
      <div class="ps-label"><span>DECISIONS</span><span class="ps-label-text">결정 필요</span></div>
      ${b.decisions.map(d => `
        <div class="decision-card">
          <div class="dc-p ${d.p.toLowerCase()}">${d.p}</div>
          <div class="dc-main">
            <div class="dc-txt">${d.t}</div>
            <div class="dc-owner ${ownerCls(d.o)}">↳ ${d.o}</div>
          </div>
        </div>
      `).join('')}
    </div>
    ` : ''}

    <div class="fit-callout ${b.fit.v}">
      <div class="fc-label">${fitLabel}</div>
      <div class="fc-txt">${b.fit.txt}</div>
    </div>
  `;
}

function goto(flowId) {
  const prev = state.flow;
  const prevIdx = FLOW_ORDER.indexOf(prev);
  const nextIdx = FLOW_ORDER.indexOf(flowId);
  const animClass = (nextIdx >= prevIdx) ? 'anim-forward' : 'anim-back';
  state.prevFlow = prev;
  state.flow = flowId;
  if (flowId === 'home') state.homeTab = 'home';
  renderFlowbar();
  renderOwnerChip();
  renderStage(animClass);
  renderPanel();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setHomeTab(tab) {
  state.homeTab = tab;
  renderStage('anim-tab');
}

/* ============ TERMS TOGGLE ============ */
function toggleTerm(idx) {
  state.terms[idx].checked = !state.terms[idx].checked;
  state.termsAll = state.terms.every(t => t.checked);
  renderStage();
}
function toggleAllTerms() {
  state.termsAll = !state.termsAll;
  state.terms = state.terms.map(t => ({ ...t, checked: state.termsAll }));
  renderStage();
}
function allRequiredChecked() {
  return state.terms.filter(t => t.req).every(t => t.checked);
}

/* ============ 09 → 10 RETURN TO AF ANIMATION ============ */
function returnToAF() {
  const body = document.getElementById('screenBody');
  const phoneScreen = document.querySelector('.phone-screen');
  body.classList.add('app-shrink');
  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay';
  overlay.innerHTML = `
    <div class="lo-box">
      <div class="lo-spinner"></div>
      <div class="lo-txt">어바웃피싱으로 돌아가는 중…</div>
      <div class="lo-sub">알림톡 2건 발송 확인 중</div>
    </div>
  `;
  phoneScreen.appendChild(overlay);
  setTimeout(() => {
    overlay.remove();
    state.prevFlow = state.flow;
    state.flow = 'done';
    renderFlowbar();
    renderOwnerChip();
    const sbHolder = document.getElementById('statusBar');
    sbHolder.innerHTML = statusBar(false);
    const newBody = document.getElementById('screenBody');
    newBody.classList.remove('app-shrink');
    newBody.innerHTML = RENDERERS['done']();
    newBody.classList.remove('anim-forward', 'anim-back', 'anim-tab', 'browser-launch');
    void newBody.offsetWidth;
    newBody.classList.add('anim-forward');
    newBody.scrollTop = 0;
    renderPanel();
  }, 1300);
}

  const body = document.getElementById('screenBody');
  // shrink the AF screen
  body.classList.add('app-shrink');
  // show loading overlay
  const phoneScreen = document.querySelector('.phone-screen');
  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay';
  overlay.innerHTML = `
    <div class="lo-box">
      <div class="lo-spinner"></div>
      <div class="lo-txt">하나손해보험 웹으로 이동 중…</div>
      <div class="lo-sub">보안 연결 설정 중</div>
    </div>
  `;
  phoneScreen.appendChild(overlay);
  // after delay: transition to hana_web with browser-launch animation
  setTimeout(() => {
    overlay.remove();
    state.prevFlow = state.flow;
    state.flow = 'hana_web';
    renderFlowbar();
    renderOwnerChip();
    const sbHolder = document.getElementById('statusBar');
    sbHolder.innerHTML = statusBar(false);
    const newBody = document.getElementById('screenBody');
    newBody.classList.remove('app-shrink');
    newBody.innerHTML = RENDERERS['hana_web']();
    newBody.classList.remove('anim-forward', 'anim-back', 'anim-tab');
    void newBody.offsetWidth;
    newBody.classList.add('browser-launch');
    newBody.scrollTop = 0;
    renderPanel();
  }, 1400);
}

/* ============ INIT ============ */
renderPlanbar();
renderFlowbar();
renderOwnerChip();
renderStage();
renderPanel();

</script>
</body>
</html>
